services:
  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env.local

  studio:
    build: ./studio
    ports:
      - "3334:3334"
    volumes:
      - ./studio:/app
      - /app/node_modules
    env_file:
      - .env.local
